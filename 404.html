<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src 'self'; base-uri 'none'; form-action 'none'" />
  <title>Page not found / 页面未找到 | wcx12</title>
  <meta name="robots" content="noindex,follow" />
  <meta name="theme-color" content="#070914" />
  <link rel="icon" type="image/svg+xml" href="/wcx12/favicon.svg" />
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; background: #070914; color: #e8f0ff; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: #070914; }
    .skip-link { position: fixed; top: 12px; left: 12px; z-index: 2; transform: translateY(-160%); background: #e8f0ff; color: #070914; padding: 10px 14px; }
    .skip-link:focus { transform: translateY(0); }
    main { width: min(760px, 100%); border-left: 3px solid #00f5ff; padding: 8px 0 8px 28px; }
    p { max-width: 66ch; margin: 10px 0 0; color: #aeb9d9; line-height: 1.65; }
    .code { color: #ff2e88; font: 700 0.85rem ui-monospace, monospace; text-transform: uppercase; }
    h1 { margin: 12px 0 18px; font-size: 4.5rem; line-height: 0.98; letter-spacing: 0; }
    h1 span { display: block; margin-top: 12px; color: #aeb9d9; font-size: 0.48em; font-weight: 600; }
    .zh-copy { color: #8996ba; }
    nav { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 24px; }
    nav a { min-height: 44px; display: inline-flex; align-items: center; border: 1px solid #00f5ff; color: #e8f0ff; padding: 10px 14px; text-decoration: none; }
    a:focus-visible, a:hover { background: #00f5ff; color: #070914; outline: none; }
    @media (max-width: 560px) {
      body { padding: 20px; }
      main { padding-left: 20px; }
      h1 { font-size: 3rem; }
      nav { display: grid; grid-template-columns: 1fr; }
      nav a { justify-content: center; }
    }
    @media (forced-colors: active) {
      a:focus-visible { outline: 3px solid Highlight; outline-offset: 3px; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content / 跳至内容</a>
  <main id="main-content">
    <span class="code">404 / route not found</span>
    <h1>Page not found.<span lang="zh-CN">页面未找到。</span></h1>
    <p>The address does not match a published page. Choose a destination below to continue.</p>
    <p class="zh-copy" lang="zh-CN">这个地址没有对应的已发布页面。请选择下方入口继续浏览。</p>
    <nav aria-label="Recovery links / 返回入口">
      <a href="/wcx12/">Home / 首页</a>
      <a href="/wcx12/research/">Research / 研究</a>
      <a href="/wcx12/projects/">Projects / 项目</a>
      <a href="/wcx12/blog/">Writing / 写作</a>
    </nav>
  </main>
</body>
</html>
