name: Metrics
on:
  # A daily refresh is enough for profile metrics and avoids 24 redundant runs.
  schedule: [{cron: "0 3 * * *"}]
  # Manual refresh remains available without racing content builds on every push.
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Pinned from lowlighter/metrics latest branch on 2026-07-10.
      - uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6
        with:
          # This short-lived token is scoped to the current repository and job.
          token: ${{ github.token }}

          # Options
          user: wcx12
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
