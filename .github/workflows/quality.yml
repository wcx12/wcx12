name: Quality

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://wcx12.github.io/wcx12
      SITE_TIME_ZONE: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate content and tests
        run: npm run validate

      - name: Check browser scripts
        run: |
          node --check site-data.js
          node --check script.js
          node --check homepage-i18n.js
          node --check research-canvas.js
          node --check repo-map.js
          node --check blog-src/assets/blog.js
          node --check scripts/build-blog.mjs
          node --check scripts/sync-github-repos.mjs
          node --check scripts/apply-research-config.mjs
          node --check scripts/research-config-schema.js

      - name: Rebuild generated site
        run: npm run build:site

      - name: Validate rebuilt site
        run: npm run validate

      - name: Package and validate Pages artifact
        run: npm run package:pages && npm run test:pages

      - name: Verify generated files are current
        run: git diff --exit-code -- index.html blog research projects publications zh resume publications.md rss.xml sitemap.xml
