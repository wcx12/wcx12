name: Quality

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://wcx12.github.io/wcx12
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate content and tests
        run: npm run validate

      - name: Check browser scripts
        run: |
          node --check script.js
          node --check blog-src/assets/blog.js
          node --check scripts/build-blog.mjs

      - name: Rebuild generated blog
        run: npm run build:blog

      - name: Verify generated files are current
        run: git diff --exit-code -- blog resume rss.xml sitemap.xml
