name: Update research mapping

on:
  workflow_dispatch:
    inputs:
      update_payload_base64:
        description: Versioned update payload copied from the owner mapping interface
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-config:
    if: ${{ github.repository_owner == 'wcx12' && github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Synchronize target branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch origin "${DEFAULT_BRANCH}"
          git merge --ff-only "origin/${DEFAULT_BRANCH}"

      - name: Validate submitted mapping
        env:
          RESEARCH_CONFIG_UPDATE_BASE64: ${{ inputs.update_payload_base64 }}
        run: node scripts/apply-research-config.mjs

      - name: Build site
        run: npm run build:site

      - name: Validate generated site
        run: npm run validate

      - name: Commit mapping
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git add research-config.json index.html blog research projects publications zh resume publications.md rss.xml sitemap.xml package-lock.json
          if git diff --cached --quiet; then
            echo "Research mapping is already current."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update research mapping and rebuild site"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${DEFAULT_BRANCH}"
          echo "changed=true" >> "$GITHUB_OUTPUT"
