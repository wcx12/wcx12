name: Update research mapping

on:
  workflow_dispatch:
    inputs:
      config_base64:
        description: Validated research configuration encoded as UTF-8 Base64
        required: true
        type: string
      expected_sha256:
        description: SHA-256 of research-config.json when editing began
        required: true
        type: string

permissions:
  contents: write
  pages: write

jobs:
  update-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Synchronize target branch
        run: |
          git fetch origin "${GITHUB_REF_NAME}"
          git merge --ff-only "origin/${GITHUB_REF_NAME}"

      - name: Validate submitted mapping
        env:
          RESEARCH_CONFIG_BASE64: ${{ inputs.config_base64 }}
          EXPECTED_CONFIG_SHA256: ${{ inputs.expected_sha256 }}
        run: node scripts/apply-research-config.mjs

      - name: Build site
        run: npm run build:site

      - name: Validate generated site
        run: npm run validate

      - name: Commit mapping
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add research-config.json index.html blog research projects publications zh resume publications.md rss.xml sitemap.xml package-lock.json
          if git diff --cached --quiet; then
            echo "Research mapping is already current."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update research mapping and rebuild site"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Request GitHub Pages build
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"
