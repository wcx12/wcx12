name: Build blog

on:
  workflow_dispatch:
  push:
    branches: ["master", "main"]
    paths:
      - "content/**"
      - "blog-src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/blog-build.yml"

permissions:
  contents: write

jobs:
  build-blog:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://wcx12.github.io/wcx12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate

      - name: Build blog
        run: npm run build:blog

      - name: Commit generated blog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog rss.xml sitemap.xml package-lock.json
          if git diff --cached --quiet; then
            echo "No generated blog changes."
          else
            git commit -m "Build blog [skip ci]"
            git push
          fi
