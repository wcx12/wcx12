name: Build site

on:
  workflow_dispatch:
  push:
    branches: ["master", "main"]
    paths:
      - "content/**"
      - "blog-src/**"
      - "scripts/**"
      - "site-data.js"
      - "research-config.json"
      - "resume.md"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/blog-build.yml"

permissions:
  contents: write

concurrency:
  group: build-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-site:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://wcx12.github.io/wcx12
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate content
        run: npm run validate

      - name: Build site
        run: npm run build:site

      - name: Commit generated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog research publications zh resume publications.md rss.xml sitemap.xml package-lock.json
          if git diff --cached --quiet; then
            echo "No generated site changes."
          else
            git commit -m "Build site [skip ci]"
            git push
          fi
