name: Build site

on:
  workflow_dispatch:
  schedule:
    - cron: "17 16 * * *"
  push:
    branches: ["master", "main"]
    paths:
      - "content/**"
      - "blog-src/**"
      - "scripts/**"
      - "index.html"
      - "styles.css"
      - "script.js"
      - "homepage-i18n.js"
      - "research-canvas.js"
      - "repo-map.js"
      - "site-data.js"
      - "research-config.json"
      - "resume.md"
      - "resume.zh.md"
      - "blog/**"
      - "research/**"
      - "projects/**"
      - "publications/**"
      - "resume/**"
      - "zh/**"
      - "publications.md"
      - "rss.xml"
      - "sitemap.xml"
      - "package.json"
      - "package-lock.json"
      - ".nvmrc"
      - ".github/workflows/blog-build.yml"

permissions:
  contents: read

concurrency:
  group: build-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-site:
    if: ${{ github.repository_owner == 'wcx12' && github.ref_name == github.event.repository.default_branch && (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: read
    env:
      SITE_URL: https://wcx12.github.io/wcx12
      SITE_TIME_ZONE: Asia/Shanghai
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'push' && github.sha || github.event.repository.default_branch }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Synchronize public repository metadata
        id: repository_sync
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/sync-github-repos.mjs

      - name: Report repository sync fallback
        if: steps.repository_sync.outcome == 'failure'
        run: echo "::warning::GitHub repository synchronization failed; building from the last committed snapshot."

      - name: Validate source content
        run: node scripts/validate-content.mjs && npm run test:content

      - name: Build site
        run: npm run build:site

      - name: Validate generated site
        run: npm run validate

      - name: Package public Pages artifact
        run: npm run package:pages

      - name: Validate public Pages artifact
        run: npm run test:pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: output/pages
          include-hidden-files: true

      - name: Commit generated site
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site-data.js index.html blog research projects publications zh resume publications.md rss.xml sitemap.xml package-lock.json
          if git diff --cached --quiet; then
            echo "No generated site changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Sync repository data and build site [skip ci]"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${DEFAULT_BRANCH}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi


  deploy-pages:
    if: ${{ github.repository_owner == 'wcx12' && github.ref_name == github.event.repository.default_branch }}
    needs: build-site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
