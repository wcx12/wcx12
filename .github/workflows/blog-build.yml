name: Build site

on:
  workflow_dispatch:
  schedule:
    - cron: "17 16 * * *"
  push:
    branches: ["master", "main"]

permissions:
  contents: read

concurrency:
  group: portfolio-publish-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build-site:
    if: ${{ github.repository_owner == 'wcx12' && github.ref_name == github.event.repository.default_branch && (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: read
    env:
      SITE_URL: https://wcx12.github.io/wcx12
      SITE_TIME_ZONE: Asia/Shanghai
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event_name == 'push' && github.sha || github.event.repository.default_branch }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Synchronize public repository metadata
        id: repository_sync
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/sync-github-repos.mjs

      - name: Report repository sync fallback
        if: steps.repository_sync.outcome == 'failure'
        run: echo "::warning::GitHub repository synchronization failed; building from the last committed snapshot."

      - name: Validate source content
        run: node scripts/validate-content.mjs && npm run test:content

      - name: Build site
        run: npm run build:site

      - name: Validate generated site
        run: npm run validate

      - name: Package public Pages artifact
        run: npm run package:pages

      - name: Validate public Pages artifact
        run: npm run test:pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: output/pages
          include-hidden-files: true

      - name: Commit generated site
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site-data.js index.html blog research projects publications zh resume publications.md rss.xml sitemap.xml package-lock.json
          if git diff --cached --quiet; then
            echo "No generated site changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Sync repository data and build site [skip ci]"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${DEFAULT_BRANCH}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi


  deploy-pages:
    if: ${{ github.repository_owner == 'wcx12' && github.ref_name == github.event.repository.default_branch }}
    needs: build-site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
