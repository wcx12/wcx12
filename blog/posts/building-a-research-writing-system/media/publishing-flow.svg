<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Research writing publication flow</title>
  <desc id="desc">Markdown and local media are validated, built, and published as pages, search data, RSS, and research evidence.</desc>
  <rect width="1200" height="460" fill="#070914"/>
  <g fill="none" stroke="#00dce8" stroke-width="2">
    <path d="M260 230H350"/>
    <path d="M550 230H640"/>
    <path d="M840 230H930"/>
  </g>
  <g fill="#00dce8">
    <path d="M350 230l-14-8v16z"/>
    <path d="M640 230l-14-8v16z"/>
    <path d="M930 230l-14-8v16z"/>
  </g>
  <g font-family="Space Grotesk, Arial, sans-serif">
    <g transform="translate(55 120)">
      <rect width="205" height="220" rx="6" fill="#0d1426" stroke="#00dce8"/>
      <text x="24" y="42" fill="#ff4a94" font-size="15" font-weight="700">SOURCE</text>
      <text x="24" y="82" fill="#f1f5ff" font-size="26" font-weight="700">Article bundle</text>
      <text x="24" y="122" fill="#9eabd0" font-size="17">index.md</text>
      <text x="24" y="153" fill="#9eabd0" font-size="17">media/</text>
      <text x="24" y="184" fill="#9eabd0" font-size="17">research metadata</text>
    </g>
    <g transform="translate(350 120)">
      <rect width="200" height="220" rx="6" fill="#0d1426" stroke="#9b67ff"/>
      <text x="24" y="42" fill="#ff4a94" font-size="15" font-weight="700">QUALITY GATE</text>
      <text x="24" y="82" fill="#f1f5ff" font-size="26" font-weight="700">Validate</text>
      <text x="24" y="122" fill="#9eabd0" font-size="17">front matter</text>
      <text x="24" y="153" fill="#9eabd0" font-size="17">media safety</text>
      <text x="24" y="184" fill="#9eabd0" font-size="17">publication state</text>
    </g>
    <g transform="translate(640 120)">
      <rect width="200" height="220" rx="6" fill="#0d1426" stroke="#ff4a94"/>
      <text x="24" y="42" fill="#ff4a94" font-size="15" font-weight="700">DETERMINISTIC</text>
      <text x="24" y="82" fill="#f1f5ff" font-size="26" font-weight="700">Build</text>
      <text x="24" y="122" fill="#9eabd0" font-size="17">render Markdown</text>
      <text x="24" y="153" fill="#9eabd0" font-size="17">fingerprint assets</text>
      <text x="24" y="184" fill="#9eabd0" font-size="17">generate indexes</text>
    </g>
    <g transform="translate(930 80)">
      <rect width="215" height="300" rx="6" fill="#0d1426" stroke="#00dce8"/>
      <text x="24" y="42" fill="#ff4a94" font-size="15" font-weight="700">PUBLIC OUTPUT</text>
      <text x="24" y="82" fill="#f1f5ff" font-size="26" font-weight="700">Publish</text>
      <text x="24" y="125" fill="#9eabd0" font-size="17">article pages</text>
      <text x="24" y="158" fill="#9eabd0" font-size="17">search and tags</text>
      <text x="24" y="191" fill="#9eabd0" font-size="17">RSS and sitemap</text>
      <text x="24" y="224" fill="#9eabd0" font-size="17">research evidence</text>
      <text x="24" y="268" fill="#00dce8" font-size="15" font-weight="700">GitHub Pages</text>
    </g>
  </g>
</svg>
